        effect_allele: A
        effect_direction: risk
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          SHARPIN encodes a component of the LUBAC (Linear Ubiquitin Chain
          Assembly Complex), which regulates NF-kB and TNF-alpha signaling.
