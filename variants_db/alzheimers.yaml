  - name: "Rare Variants"
    description: >
      Rare coding variants with larger individual effect sizes.
      Because they are uncommon (MAF < 1%), imputation accuracy is lower.
      A carrier call at these loci should be confirmed by sequencing.
    variants:
      - rsid: rs75932628
        chrom: chr6
        pos: 41161514
        ref: C
        alt: T
        gene: TREM2
        effect: "R47H missense mutation; large risk increase (OR 3.88)"
        effect_allele: T
        effect_direction: risk
        confidence_status: current
        confidence_note: >
          Strongly confirmed. Structural mechanisms precisely characterized:
          CDR2 loop disruption, allosteric trimer disruption, shifted apoE3
          binding. Carriers show elevated NfL but not GFAP.
        last_reviewed: "2026-03-11"
        mechanism: >
          R47H disrupts TREM2's CDR2 loop, reducing ligand binding. It
          allosterically disrupts TREM2 trimer formation and shifts apoE3
          binding into the multimerization interface. Microglia become less
          effective cleaners and more inflammatory. Carriers show elevated
          NfL (axonal damage) but not GFAP (glial activation), suggesting
          selective axonal vulnerability. Soluble TREM2 stalk domain can
          partially compensate via phospholipid binding.
        layman: >
          TREM2 tells brain immune cells what to clean up. This mutation warps
          TREM2's shape and prevents it from clustering properly. Rare (~0.5%),
          but carriers have about 4x increased risk. Brain scans show nerve
          fiber damage specifically, not general inflammation.
        source: "Jonsson et al. 2013; Guerreiro et al. 2013"
        studies:
