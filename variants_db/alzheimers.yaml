  ############################################################
  # Deterministic Early-Onset Alzheimer's Disease (EOAD)
  ############################################################

  - name: "Deterministic Genes (Not Interpretable)"
    description: >
      Mutations in these genes cause early-onset Alzheimer's, but 23andMe
      redacts the raw data for these medically actionable regions. The
      imputed data shown here is statistical guesswork and cannot be used
      to determine whether you carry a disease-causing mutation. Clinical
      genetic testing is required for meaningful results.
    regions:
      - gene: APP
        chrom: chr21
        start: 26609429
        end: 26675995
        effect: "Amyloid precursor protein mutations cause familial EOAD"
        effect_direction: risk
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          APP encodes the amyloid precursor protein. Mutations alter enzyme
          cutting sites, producing sticky amyloid-beta fragments that clump
          into plaques.
        layman: >
          Mutations here are extremely rare but virtually guarantee early-onset
          Alzheimer's (usually before age 65).
        likely_redacted: true

      - gene: PSEN1
        chrom: chr14
        start: 73136417
        end: 73223691
        effect: "Presenilin-1 mutations cause familial EOAD"
        effect_direction: risk
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          PSEN1 encodes the catalytic core of gamma-secretase. Over 300 known
          mutations shift the cut point, producing longer, stickier amyloid-beta-42.
        layman: >
          The most common cause of inherited early-onset Alzheimer's. Mutations
          make molecular scissors cut APP in the wrong place.
        likely_redacted: true

      - gene: PSEN2
        chrom: chr1
        start: 226870616
        end: 226903668
        effect: "Presenilin-2 mutations cause familial EOAD"
        effect_direction: risk
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          PSEN2 is a paralog of PSEN1 in the gamma-secretase complex. Mutations
          have similar effects but with later onset and more variable penetrance.
        layman: >
          A backup copy of PSEN1. Mutations also cause inherited Alzheimer's
          but typically with later and more variable onset. Very rare.
        likely_redacted: true
