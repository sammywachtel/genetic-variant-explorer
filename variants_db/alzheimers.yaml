# Alzheimer's Disease — Genetic Variant Database
# Pure research data. No individual genomes, no personal results.
# All coordinates: GRCh38 (hg38), verified against NCBI dbSNP.
#
# Sources (original):
#   - Lambert et al. 2013 (Nature Genetics) — IGAP meta-analysis
#   - Kunkle et al. 2019 (Nature Genetics) — largest AD GWAS at the time
#   - Hollingworth et al. 2011 (Nature Genetics) — CD2AP, CD33
#   - Jonsson et al. 2012 (Nature) — APP A673T (Icelandic protective)
#   - Jonsson et al. 2013 (NEJM) — TREM2 R47H
#   - Sims et al. 2017 (Nature Genetics) — TREM2 R62H, PLCG2, ABI3
#   - Arboleda-Velasquez et al. 2019 (Nature Medicine) — APOE Christchurch
#   - Strittmatter et al. 1993 (PNAS) — APOE e2/e3/e4
#
# Sources (2022-2026 updates):
#   - Bellenguez et al. 2022 (Nature Genetics) — 75 loci, 42 novel
#   - Wightman et al. 2021 (Nature Genetics) — 1.1M individuals
#   - Willett et al. 2025 (Alzheimer's & Dementia) — multi-ancestry WGS
#   - Various 2024-2026 mechanistic and biomarker studies (see per-variant)
#
# Effect directions:
#   "risk"       — effect_allele increases AD risk
#   "protective" — effect_allele decreases AD risk
#
# Confidence statuses:
#   "current"   — mechanism and direction supported by current research
#   "revised"   — association holds, but mechanism/interpretation updated
#   "legacy"    — relevance or mechanism questioned by recent research
#   "disproven" — evidence no longer supports original association
#
# Last full review: 2026-03-11

version: "2.0"

disease: "Alzheimer's Disease"
description: >
  Curated Alzheimer's disease genetic variants derived from validated
  genome-wide association studies, rare variant studies, and deterministic
  early-onset Alzheimer's disease genes. Updated March 2026 to reflect
  post-amyloid-cascade understanding: AD is now recognized as a
  multifactorial disease driven by neuroinflammation, lipid dysfunction,
  tau propagation, blood-brain barrier disruption, and amyloid pathology
  acting in concert. Confidence flags indicate where the original
  amyloid-centric framing has been revised. Coordinates verified against
  dbSNP GRCh38.

categories:

  ############################################################
  # APOE Core Risk Variants
  ############################################################

  - name: "APOE Variants"
    description: >
      The APOE gene on chromosome 19 is the strongest common genetic risk
      factor for late-onset Alzheimer's. Two SNPs define three haplotypes
      (E2, E3, E4). E3 is the most common and considered baseline. E4
      increases risk (~3-4x per copy). E2 is mildly protective. APOE's
      role extends far beyond amyloid clearance: it regulates blood-brain
      barrier integrity, lipid transport, microglial activation state,
      and oligodendrocyte function.
    variants:
      - rsid: rs429358
        chrom: chr19
        pos: 44908684
        ref: T
        alt: C
        gene: APOE
        effect: "Part of APOE e4 haplotype; strongest common genetic risk factor"
        effect_allele: C
        effect_direction: risk
        confidence_status: revised
        confidence_note: >
          The amyloid clearance mechanism described in the original entry was
          accurate but vastly incomplete. APOE4 now understood to act through
          multiple pathways: BBB disruption (CypA-MMP9), lipid droplet
          accumulation in microglia, impaired oligodendrocyte function
          (LXRb/ABCA1 pathway causing demyelination), and promotion of
          pro-inflammatory microglial states independent of amyloid. Amyloid
          clearance is perhaps 30% of the full picture.
        last_reviewed: "2026-03-11"
        mechanism: >
          The C allele at this position changes amino acid 112 from cysteine to
          arginine, defining the E4 isoform. APOE4 acts through multiple
          pathways: (1) reduced amyloid-beta clearance and promoted aggregation,
          (2) blood-brain barrier disruption via the CypA-MMP9 pathway,
          (3) lipid droplet accumulation in microglia impairing their function,
          (4) impaired oligodendrocyte myelination through the LXRb/ABCA1
          pathway, and (5) promotion of a pro-inflammatory microglial state
          independent of amyloid pathology.
        layman: >
          This is one of two positions that determines your APOE type (E2, E3, or E4).
          The C allele here means E4, which is the biggest common genetic risk factor
          for Alzheimer's. One copy roughly triples your risk; two copies increase
          it ~12-fold. APOE4 affects many brain systems beyond amyloid: it weakens
          the blood-brain barrier, impairs the brain's immune cells, and disrupts
          the insulation around nerve fibers. Most E4 carriers never develop AD —
          it shifts probability, not destiny.
        source: "Strittmatter et al. 1993"
        studies:
          - id: strittmatter_1993
            title: "Apolipoprotein E: high-avidity binding to beta-amyloid and increased frequency of type 4 allele in late-onset familial Alzheimer disease"
            authors: "Strittmatter et al."
            year: 1993
            journal: "PNAS"
            doi: "10.1073/pnas.90.5.1977"
            url: "https://doi.org/10.1073/pnas.90.5.1977"
            finding: "Original discovery of APOE4 as AD risk factor"
          - id: montagne_2020
            title: "APOE4 leads to blood-brain barrier dysfunction predicting cognitive decline"
            authors: "Montagne et al."
            year: 2020
            journal: "Nature"
            doi: "10.1038/s41586-020-2247-3"
            url: "https://doi.org/10.1038/s41586-020-2247-3"
            finding: "APOE4 carriers show BBB breakdown in hippocampus independent of amyloid or tau, mediated by CypA-MMP9 pathway"
          - id: victor_2022
            title: "Lipid accumulation induced by APOE4 impairs microglial surveillance of neuronal-network activity"
            authors: "Victor et al."
            year: 2022
            journal: "Cell Stem Cell"
            doi: "10.1016/j.stem.2022.09.005"
            url: "https://doi.org/10.1016/j.stem.2022.09.005"
            finding: "APOE4 causes lipid droplet accumulation in microglia, impairing surveillance function"
          - id: blanchard_2022
            title: "APOE4 impairs myelination via cholesterol dysregulation in oligodendrocytes"
            authors: "Blanchard et al."
            year: 2022
            journal: "Nature"
            doi: "10.1038/s41586-022-05439-w"
            url: "https://doi.org/10.1038/s41586-022-05439-w"
            finding: "APOE4 impairs cholesterol transport to oligodendrocytes via LXRb/ABCA1 pathway"

      - rsid: rs7412
        chrom: chr19
        pos: 44908822
        ref: C
        alt: T
        gene: APOE
        effect: "Part of APOE e2 haplotype; protective against AD"
        effect_allele: T
        effect_direction: protective
        confidence_status: revised
        confidence_note: >
          Original mechanism focused solely on amyloid-beta binding. APOE2's
          protection now understood to involve superior lipid transport, better
          BBB maintenance, and anti-inflammatory signaling.
        last_reviewed: "2026-03-11"
        mechanism: >
          The T allele at this position changes amino acid 158 from arginine to
          cysteine, defining the E2 isoform. APOE2 provides protection through
          multiple mechanisms: more efficient lipid transport supporting neuronal
          membrane integrity, better blood-brain barrier maintenance, enhanced
          anti-inflammatory signaling in microglia, and more effective amyloid-beta
          clearance compared to E3/E4.
        layman: >
          The other position that determines your APOE type. The T allele here
          means E2, which is mildly protective against Alzheimer's. E2 carriers
          have roughly half the average risk. E2 helps the brain in several ways:
          better fat transport to brain cells, stronger blood-brain barrier, and
          calmer immune response. E2/E2 is uncommon (~1% of people).
        source: "Strittmatter et al. 1993"
        studies:
          - id: strittmatter_1993
            title: "Apolipoprotein E: high-avidity binding to beta-amyloid"
            authors: "Strittmatter et al."
            year: 1993
            journal: "PNAS"
            doi: "10.1073/pnas.90.5.1977"
            url: "https://doi.org/10.1073/pnas.90.5.1977"
            finding: "Original characterization of APOE isoforms and AD risk"

      - rsid: rs121918393
        chrom: chr19
        pos: 44908756
        ref: C
        alt: A
        gene: APOE
        effect: "R136S (Christchurch mutation); protects against AD even in high-risk carriers"
        effect_allele: A
        effect_direction: protective
        confidence_status: current
        confidence_note: >
          Confirmed and extended. E2-Christchurch combination suppresses tau
          tangles in tau models. Being explored as gene therapy target.
        last_reviewed: "2026-03-11"
        mechanism: >
          The Christchurch mutation (R136S) reduces APOE's ability to bind
          heparan sulfate proteoglycans, limiting amyloid-beta uptake into
          neurons. Even in PSEN1 mutation carriers, this variant delayed onset
          by decades. Recent work shows E2-Christchurch also suppresses tau
          tangle formation.
        layman: >
          An extremely rare mutation found in a Colombian family. One woman carrying
          genes that should have caused Alzheimer's in her 40s didn't develop symptoms
          until her 70s. It works by limiting toxic protein uptake and suppressing tau
          tangles. Being studied as a potential gene therapy approach.
        source: "Arboleda-Velasquez et al. 2019 (Nature Medicine)"
        studies:
          - id: arboleda_2019
            title: "Resistance to autosomal dominant Alzheimer's disease in an APOE3 Christchurch homozygote"
            authors: "Arboleda-Velasquez et al."
            year: 2019
            journal: "Nature Medicine"
            doi: "10.1038/s41591-019-0611-3"
            url: "https://doi.org/10.1038/s41591-019-0611-3"
            finding: "APOE3ch homozygosity protected against autosomal dominant AD, delaying onset by ~3 decades"

      - rsid: rs63750847
        chrom: chr21
        pos: 25897620
        ref: C
        alt: T
        gene: APP
        effect: "A673T (Icelandic mutation). Reduces amyloid production."
        effect_allele: T
        effect_direction: protective
        confidence_status: current
        confidence_note: >
          Mechanism confirmed and unchanged. One of the strongest pieces of
          evidence that amyloid production does contribute to AD.
        last_reviewed: "2026-03-11"
        mechanism: >
          This mutation sits right next to the beta-secretase cleavage site on APP,
          reducing cleavage by ~40%. Less cleavage means less amyloid-beta production.
        layman: >
          A rare protective mutation discovered in Iceland. It makes the APP protein
          harder for enzymes to cut, so less toxic amyloid gets produced. Carriers
          have roughly 5x lower risk of Alzheimer's. Very rare outside Scandinavia.
        source: "Jonsson et al. 2012 (Nature)"
        studies:
          - id: jonsson_2012
            title: "A mutation in APP protects against Alzheimer's disease and age-related cognitive decline"
            authors: "Jonsson et al."
            year: 2012
            journal: "Nature"
            doi: "10.1038/nature11283"
            url: "https://doi.org/10.1038/nature11283"
            finding: "A673T reduces beta-cleavage of APP by ~40%, conferring ~5x protection against AD"

    interpreters:
      - gene: APOE
        function: apoe_genotype
        description: "Combines rs429358 + rs7412 to determine E2/E3/E4 haplotype."


  ############################################################
  # Established Common GWAS Loci
  ############################################################

  - name: "Established GWAS Loci"
    description: >
      Common variants replicated across multiple Alzheimer's GWAS
      meta-analyses (IGAP 2013, Kunkle 2019, Bellenguez 2022). Each
      contributes a modest effect (OR typically 0.8-1.3). Many were
      originally described in terms of amyloid clearance; current
      understanding recognizes broader roles in neuroinflammation,
      lipid metabolism, tau propagation, and synaptic maintenance.
    variants:
      - rsid: rs6656401
        chrom: chr1
        pos: 207518704
        ref: A
        alt: G
        gene: CR1
        effect: "Complement receptor 1 locus"
        effect_allele: A
        effect_direction: risk
        confidence_status: revised
        confidence_note: >
          Original mechanism (reduced amyloid clearance) may be directionally
          wrong. 2025 data shows CR1*2 ENHANCES phagocytosis, suggesting
          excessive complement-mediated synaptic pruning as risk mechanism.
        last_reviewed: "2026-03-11"
        mechanism: >
          CR1 encodes complement receptor 1. The CR1*2 risk variant shows lower
          protein expression but paradoxically enhanced phagocytic function — glia
          more aggressively engulf opsonized targets including synaptoneurosomes.
          Risk likely comes from excessive complement-mediated synaptic pruning
          rather than impaired amyloid clearance. Complement dysregulation is now
          viewed as a primary AD contributor.
        layman: >
          Your immune system tags brain debris for cleanup. This variant makes the
          cleanup crew more aggressive — which sounds good, but they also attack
          healthy synapses (brain connections). The risk is from over-pruning healthy
          connections, not from failing to clear amyloid.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals identifies 11 new susceptibility loci for Alzheimer's disease"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification of CR1 as AD risk locus"
          - id: cr1_phagocytosis_2025
            title: "The AD-associated complement receptor 1 variant confers risk by impacting glial phagocytosis"
            authors: "Various"
            year: 2025
            journal: "Nature Neuroscience"
            url: "https://pubmed.ncbi.nlm.nih.gov/40631443/"
            finding: "CR1*2 shows enhanced phagocytosis despite lower expression, suggesting excessive synaptic pruning"

      - rsid: rs3865444
        chrom: chr19
        pos: 51224706
        ref: C
        alt: A
        gene: CD33
        effect: "Microglial immune regulation locus"
        effect_allele: A
        effect_direction: protective
        confidence_status: revised
        confidence_note: >
          Core association holds but mechanism more nuanced. CD33 isoforms
          (CD33M vs CD33m) have distinct regulatory roles. CD33 negatively
          regulates TREM2 downstream signaling in coordinated circuits.
        last_reviewed: "2026-03-11"
        mechanism: >
          CD33 is expressed on microglia. The protective A allele promotes the
          shorter CD33m isoform which releases the brake on TREM2 downstream
          signaling, enhancing phagocytosis. AD-associated CD33M isoforms
          suppress TREM2 signaling through coordinated feedback loops involving
          PTPN6, CASS4, and SRC in specific microglial subtypes.
        layman: >
          Microglia are your brain's immune cells. CD33 puts the brakes on them.
          The protective version produces a shorter protein that can't brake
          effectively, letting immune cells do their cleanup job. It specifically
          works through the TREM2 system — one of the most important immune
          pathways in Alzheimer's.
        source: "Hollingworth et al. 2011; Lambert et al. 2013"
        studies:
          - id: hollingworth_2011
            title: "Common variants at ABCA7, MS4A6A/MS4A4E, EPHA1, CD33 and CD2AP"
            authors: "Hollingworth et al."
            year: 2011
            journal: "Nature Genetics"
            doi: "10.1038/ng.803"
            url: "https://doi.org/10.1038/ng.803"
            finding: "Original identification of CD33 as AD locus"
          - id: cd33_isoforms_2024
            title: "AD-associated isoforms of human CD33 distinctively modulate microglial responses"
            authors: "Various"
            year: 2024
            journal: "Molecular Neurodegeneration"
            doi: "10.1186/s13024-024-00734-8"
            url: "https://doi.org/10.1186/s13024-024-00734-8"
            finding: "CD33M and CD33m isoforms have distinct regulatory effects beyond simple phagocytosis"

      - rsid: rs9349407
        chrom: chr6
        pos: 47485642
        ref: G
        alt: C
        gene: CD2AP
        effect: "Endocytosis / synaptic trafficking pathway locus"
        effect_allele: C
        effect_direction: risk
        confidence_status: revised
        confidence_note: >
          Now understood more broadly as affecting lipid trafficking and
          synaptic protein recycling, not just amyloid clearance.
        last_reviewed: "2026-03-11"
        mechanism: >
          CD2AP is involved in endocytosis and receptor trafficking at synapses.
          Disruption affects lipid trafficking, synaptic protein recycling, and
          the endosomal-lysosomal system broadly. CD2AP loss also compromises
          the blood-brain barrier and tau propagation pathways.
        layman: >
          Cells have an internal recycling system for clearing waste and moving
          fats around. This variant makes that system less efficient, affecting
          multiple aspects of brain cell health — not just amyloid but also
          how synapses maintain themselves.
        source: "Hollingworth et al. 2011"
        studies:
          - id: hollingworth_2011
            title: "Common variants at ABCA7, MS4A6A/MS4A4E, EPHA1, CD33 and CD2AP"
            authors: "Hollingworth et al."
            year: 2011
            journal: "Nature Genetics"
            doi: "10.1038/ng.803"
            url: "https://doi.org/10.1038/ng.803"
            finding: "Original GWAS identification"

      - rsid: rs983392
        chrom: chr11
        pos: 60156035
        ref: A
        alt: G
        gene: MS4A6A
        effect: "MS4A immune gene cluster locus"
        effect_allele: G
        effect_direction: protective
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          MS4A6A is part of a cluster of membrane-spanning genes expressed in
          myeloid cells and microglia. The protective allele modulates microglial
          activation and neuroinflammatory responses. Part of an immune-sensing
          cluster alongside CD33 and INPP5D.
        layman: >
          Part of a family of genes that affect how brain immune cells behave.
          The protective version fine-tunes the immune response — enough to
          fight problems but not so much that it causes inflammation damage.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"

      - rsid: rs35349669
        chrom: chr2
        pos: 233159830
        ref: C
        alt: T
        gene: INPP5D
        effect: "Microglial signaling gene (SHIP1)"
        effect_allele: C
        effect_direction: risk
        confidence_status: revised
        confidence_note: >
          Oversimplified as "pro-inflammatory." INPP5D/SHIP1 is a negative
          regulator of phagocytic capacity with context-dependent phenotypes
          operating in coordinated microglial circuits.
        last_reviewed: "2026-03-11"
        mechanism: >
          INPP5D (SHIP1) is a lipid phosphatase that dephosphorylates PIP3,
          negatively regulating TREM2 downstream signaling and phagocytic
          capacity. Effects vary by microglial subtype and disease stage.
          Operates in circuits with NLRP3 inflammasome activation.
        layman: >
          This gene controls a signaling switch inside brain immune cells. Rather
          than simply making cells overactive, it regulates how well they can
          engulf and clear debris. The effect is complex and depends on disease
          stage and which type of immune cell is involved.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"
          - id: inpp5d_nlrp3_2023
            title: "Microglial function, INPP5D/SHIP1 signaling, and NLRP3 inflammasome activation"
            authors: "Various"
            year: 2023
            journal: "Molecular Neurodegeneration"
            doi: "10.1186/s13024-023-00674-9"
            url: "https://doi.org/10.1186/s13024-023-00674-9"
            finding: "INPP5D modulates NLRP3 inflammasome with context-dependent effects"

      - rsid: rs1476679
        chrom: chr7
        pos: 100406823
        ref: C
        alt: T
        gene: ZCWPW1
        effect: "LOAD-associated GWAS locus"
        effect_allele: T
        effect_direction: protective
        confidence_status: current
        last_reviewed: "2026-03-11"
        mechanism: >
          ZCWPW1 is involved in epigenetic regulation (reading histone marks).
          The protective allele may influence gene expression patterns that
          support neuronal health and synaptic maintenance.
        layman: >
          This gene helps read chemical marks on DNA that control which genes
          are turned on or off. The protective version helps maintain healthier
          gene activity patterns in brain cells as you age.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"

      - rsid: rs190982
        chrom: chr5
        pos: 88927603
        ref: G
        alt: A
        gene: MEF2C
        effect: "Neuronal transcription factor locus"
        effect_allele: A
        effect_direction: protective
        confidence_status: current
        confidence_note: >
          Confirmed. Also part of microglial transcriptional network with SPI1/PU.1.
        last_reviewed: "2026-03-11"
        mechanism: >
          MEF2C is a transcription factor critical for neuronal development,
          synaptic plasticity, and memory formation. Also part of a microglial
          transcriptional network regulated by SPI1/PU.1.
        layman: >
          MEF2C is a master switch for brain cell health and memory formation.
          It works in both nerve cells and immune cells. The protective version
          keeps this switch working better for longer.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"

      - rsid: rs3851179
        chrom: chr11
        pos: 86157598
        ref: T
        alt: C
        gene: PICALM
        effect: "Promoter variant affecting endocytosis. OR ~0.88 per copy."
        effect_allele: T
        effect_direction: protective
        confidence_status: current
        confidence_note: >
          Endocytic function confirmed. Role in tau clearance increasingly
          recognized alongside amyloid clearance.
        last_reviewed: "2026-03-11"
        mechanism: >
          PICALM is essential for clathrin-mediated endocytosis. The protective
          allele enhances PICALM expression, improving autophagy and clearance
          of both amyloid-beta and tau through the endosomal-lysosomal pathway.
        layman: >
          Cells have a built-in vacuum cleaner for waste. This gene keeps that
          vacuum running well. The protective version means more efficient cleanup
          of both amyloid and tau — the two toxic proteins in Alzheimer's.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"

      - rsid: rs11136000
        chrom: chr8
        pos: 27607002
        ref: T
        alt: C
        gene: CLU
        effect: "Clusterin variant, involved in multiple protective pathways."
        effect_allele: T
        effect_direction: protective
        confidence_status: revised
        confidence_note: >
          Amyloid chaperone function confirmed, but clusterin's roles in lipid
          transport, complement regulation, and cell survival signaling are now
          considered equally or more important.
        last_reviewed: "2026-03-11"
        mechanism: >
          Clusterin (apolipoprotein J) is a multifunctional chaperone. It binds
          soluble amyloid-beta for clearance across the BBB, but also plays
          critical roles in lipid transport, complement cascade regulation, and
          cytoprotective signaling against oxidative stress.
        layman: >
          Clusterin is a Swiss Army knife protein — it escorts amyloid out of
          the brain, helps transport fats, regulates the immune system, and
          protects cells from stress. The protective version provides more of
          this multitasker.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"

      - rsid: rs7561528
        chrom: chr2
        pos: 127132061
        ref: G
        alt: A
        gene: BIN1
        effect: "Near BIN1, involved in tau pathology and microglial activation. OR ~1.15 per copy."
        effect_allele: A
        effect_direction: risk
        confidence_status: current
        confidence_note: >
          One of the dictionary's strongest entries. Tau interaction confirmed
          by 2024-2025 research. BIN1 SH3 domain directly binds tau. Also linked
          to sTREM2, microglial activation, and CSF p-tau levels.
        last_reviewed: "2026-03-11"
        mechanism: >
          BIN1's SH3 domain directly binds tau's proline-rich domain and promotes
          extracellular vesicle-mediated tau spread between neurons. Risk alleles
          correlate with elevated sTREM2 and CSF p-tau levels, linking tau
          propagation to microglial activation. Second-strongest common genetic
          risk factor after APOE.
        layman: >
          BIN1 is the second-strongest common risk factor after APOE. It directly
          grabs tau protein and helps it spread between brain cells. BIN1 risk
          variants also activate brain immune cells and correlate with higher
          p-tau levels — relevant to the newest blood-based Alzheimer's tests.
        source: "Lambert et al. 2013"
        studies:
          - id: lambert_2013
            title: "Meta-analysis of 74,046 individuals"
            authors: "Lambert et al."
            year: 2013
            journal: "Nature Genetics"
            doi: "10.1038/ng.2802"
            url: "https://doi.org/10.1038/ng.2802"
            finding: "Original GWAS identification"
          - id: bin1_strem2_2024
            title: "BIN1-sTREM2-Tau pathway in Alzheimer's disease"
            authors: "Various"
            year: 2024
            journal: "Journal of Alzheimer's Disease"
            finding: "BIN1 variants mediate tau pathology through sTREM2 and microglial activation"

      - rsid: rs3764650
        chrom: chr19
        pos: 1046521
        ref: T
        alt: G
        gene: ABCA7
        effect: "Lipid transporter variant. OR ~1.23 per copy."
        effect_allele: G
        effect_direction: risk
        confidence_status: revised
        confidence_note: >
          Originally described as microglial amyloid phagocytosis. 2025 Nature
          study revealed ABCA7 LOF disrupts mitochondrial phospholipids and ATP
          synthase across neural cell types. Lipid-mitochondrial dysfunction may
          be more fundamental.
        last_reviewed: "2026-03-11"
        mechanism: >
          ABCA7 is a lipid transporter in microglia and neurons. Loss of function
