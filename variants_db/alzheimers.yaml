      (111,326 AD cases, 677,663 controls) and Willett et al. 2025
      multi-ancestry meta-analysis. These represent newly discovered
      pathways including the LUBAC ubiquitin complex, tau biology,
      lysosomal-progranulin signaling, and expanded microglial pathways.
    variants:
      # ── LUBAC Ubiquitin Pathway ──

      - rsid: rs34173062
